<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Clock - World Time</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Courier New', monospace;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            width: 100%;
        }
        
        h1 {
            text-align: center;
            color: #fff;
            margin-bottom: 40px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .clock-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        
        .clock-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            transition: transform 0.3s, box-shadow 0.3s;
        }
        
        .clock-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 12px 40px 0 rgba(31, 38, 135, 0.5);
        }
        
        .timezone-name {
            font-size: 1.2em;
            color: #00d4ff;
            margin-bottom: 10px;
            font-weight: bold;
        }
        
        .time {
            font-size: 2.5em;
            color: #fff;
            margin: 15px 0;
            font-weight: bold;
            letter-spacing: 2px;
        }
        
        .date {
            font-size: 0.9em;
            color: #b0b0b0;
            margin-bottom: 10px;
        }
        
        .tz-label {
            font-size: 0.8em;
            color: #888;
            margin-top: 10px;
        }
        
        .footer {
            text-align: center;
            color: #fff;
            margin-top: 40px;
            font-size: 0.9em;
        }
        
        .auto-update {
            color: #00d4ff;
            font-size: 0.8em;
            margin-top: 10px;
        }
        
        @media (max-width: 768px) {
            h1 {
                font-size: 1.8em;
            }
            
            .clock-grid {
                grid-template-columns: 1fr;
            }
            
            .time {
                font-size: 2em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌍 Digital Clock - World Time</h1>
        
        <div class="clock-grid" id="clockGrid">
            <!-- Clock cards will be inserted here by JavaScript -->
        </div>
        
        <div class="footer">
            <p>Displaying current time in different time zones</p>
            <p class="auto-update">⚡ Auto-updating every second</p>
        </div>
    </div>
    
    <script>
        async function updateClock() {
            try {
                const response = await fetch('/api/time');
                const data = await response.json();
                
                const clockGrid = document.getElementById('clockGrid');
                clockGrid.innerHTML = '';
                
                Object.entries(data).forEach(([name, timeData]) => {
                    const card = document.createElement('div');
                    card.className = 'clock-card';
                    card.innerHTML = `
                        <div class="timezone-name">${name}</div>
                        <div class="date">${timeData.date}</div>
                        <div class="time">${timeData.time}</div>
                        <div class="tz-label">${timeData.timezone}</div>
                    `;
                    clockGrid.appendChild(card);
                });
            } catch (error) {
                console.error('Error updating clock:', error);
            }
        }
        
        // Update clock immediately and then every second
        updateClock();
        setInterval(updateClock, 1000);
    </script>
</body>
</html>
